on:
  push:
    branches: [ master ]
  
jobs:
  Job1:
    runs-on: ubuntu-latest
    steps:
      - name: job1 step1 
        run: |
          echo "Hello job1"
          ls -lah
  Job2:
    needs: Job1
    runs-on: ubuntu-latest
    steps:
      - name: job2 
        run: |
          echo "Hello job2"
          ls -lah
  Job3:
    needs: Job1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Archive coverage report
        uses: actions/upload-artifact@v7
        with:
          name: test-upload
          path: ./test.txt
  Job4:
    needs: Job3
    runs-on: ubuntu-latest
    steps:
      - name: job1 step1 
        run: ls -lah
      - name: Download Artifact step 2
        uses: actions/download-artifact@v8
        with:
          name: test-download
          path: ./
      - name: job1 step3 
        run: ls -lah
